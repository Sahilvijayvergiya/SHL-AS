<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHL Assessment Chat</title>
  <style>
    :root {
      --bg: #f4efe8;
      --panel: #fffaf3;
      --panel-strong: #ffffff;
      --border: #d9cbb9;
      --text: #1e1a16;
      --muted: #6a5f54;
      --accent: #a3472f;
      --accent-dark: #7f341f;
      --user: #1f5f5b;
      --user-soft: #dcefed;
      --assistant-soft: #f6e2cc;
      --shadow: 0 18px 50px rgba(79, 50, 24, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(163, 71, 47, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(31, 95, 91, 0.18), transparent 25%),
        linear-gradient(180deg, #f8f2ea 0%, var(--bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: min(980px, 100%);
      height: min(88vh, 860px);
      background: rgba(255, 250, 243, 0.92);
      border: 1px solid rgba(217, 203, 185, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .hero {
      padding: 28px 28px 20px;
      border-bottom: 1px solid rgba(217, 203, 185, 0.75);
      background:
        linear-gradient(135deg, rgba(246, 226, 204, 0.7), rgba(255, 255, 255, 0.25)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0.15));
    }

    .eyebrow {
      margin: 0 0 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1;
      font-weight: 700;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
      max-width: 700px;
    }

    .messages {
      padding: 24px 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 82%;
      padding: 16px 18px;
      border-radius: 20px;
      border: 1px solid transparent;
      line-height: 1.5;
      white-space: pre-wrap;
      animation: slide-up 180ms ease-out;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-soft);
      border-color: rgba(31, 95, 91, 0.15);
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-soft);
      border-color: rgba(163, 71, 47, 0.12);
    }

    .message.system {
      align-self: center;
      text-align: center;
      max-width: 100%;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      border-color: rgba(217, 203, 185, 0.8);
      color: var(--muted);
      font-size: 14px;
    }

    .recommendations {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .recommendation {
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(217, 203, 185, 0.9);
      border-radius: 14px;
    }

    .recommendation a {
      color: var(--accent-dark);
      text-decoration: none;
      font-weight: 700;
    }

    .recommendation a:hover {
      text-decoration: underline;
    }

    .recommendation small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .composer {
      border-top: 1px solid rgba(217, 203, 185, 0.75);
      padding: 18px 20px 20px;
      background: rgba(255, 250, 243, 0.96);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 62px;
      max-height: 180px;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      padding: 16px 18px;
      font: inherit;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    textarea:focus {
      border-color: rgba(163, 71, 47, 0.5);
      box-shadow: 0 0 0 4px rgba(163, 71, 47, 0.08);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font: inherit;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .send {
      background: var(--accent);
      color: #fff;
      min-width: 110px;
    }

    .reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .hint {
      margin: 10px 4px 0;
      color: var(--muted);
      font-size: 13px;
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 0;
      }

      .shell {
        height: 100vh;
        border-radius: 0;
      }

      .hero,
      .messages,
      .composer {
        padding-left: 18px;
        padding-right: 18px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: stretch;
      }

      .actions button {
        flex: 1;
      }

      .message {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">SHL Assessment Recommendation Agent</p>
      <h1>Chat Interface</h1>
      <p class="subtitle">
        Describe the role, seniority, and the kind of skills or traits you want to assess. The assistant will ask follow-up questions and recommend SHL assessments.
      </p>
    </section>

    <section id="messages" class="messages" aria-live="polite"></section>

    <section class="composer">
      <form id="chat-form">
        <div class="controls">
          <textarea
            id="input"
            name="message"
            placeholder="Example: I need assessments for a mid-level Java developer with strong problem-solving and communication skills."
            required
          ></textarea>
          <div class="actions">
            <button type="button" class="reset" id="reset">Start Over</button>
            <button type="submit" class="send" id="send">Send</button>
          </div>
        </div>
      </form>
      <p class="hint">Press Enter to send. Use Shift+Enter for a new line.</p>
    </section>
  </main>

  <script>
    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("chat-form");
    const inputEl = document.getElementById("input");
    const sendEl = document.getElementById("send");
    const resetEl = document.getElementById("reset");

    let conversation = [];

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addBubble(role, text, recommendations = []) {
      const bubble = document.createElement("article");
      bubble.className = `message ${role}`;

      const textNode = document.createElement("div");
      textNode.textContent = text;
      bubble.appendChild(textNode);

      if (recommendations.length) {
        const list = document.createElement("div");
        list.className = "recommendations";

        recommendations.forEach((item) => {
          const card = document.createElement("div");
          card.className = "recommendation";
          card.innerHTML = `
            <a href="${item.url}" target="_blank" rel="noreferrer">${item.name}</a>
            <small>Type: ${item.test_type}</small>
          `;
          list.appendChild(card);
        });

        bubble.appendChild(list);
      }

      messagesEl.appendChild(bubble);
      scrollToBottom();
    }

    function addSystemNote(text) {
      const note = document.createElement("article");
      note.className = "message system";
      note.textContent = text;
      messagesEl.appendChild(note);
      scrollToBottom();
    }

    function setPending(isPending) {
      sendEl.disabled = isPending;
      resetEl.disabled = isPending;
      inputEl.disabled = isPending;
      sendEl.textContent = isPending ? "Sending..." : "Send";
    }

    function resetConversation() {
      conversation = [];
      messagesEl.innerHTML = "";
      addBubble(
        "assistant",
        "Tell me about the role you are hiring for, and I will recommend relevant SHL assessments."
      );
      inputEl.focus();
    }

    async function submitMessage(message) {
      conversation.push({ role: "user", content: message });
      addBubble("user", message);
      setPending(true);

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ messages: conversation })
        });

        if (!response.ok) {
          const fallback = `Request failed with status ${response.status}`;
          let detail = fallback;

          try {
            const data = await response.json();
            detail = data.detail || fallback;
          } catch (_) {
            detail = fallback;
          }

          addSystemNote(detail);
          return;
        }

        const data = await response.json();
        conversation.push({ role: "assistant", content: data.reply });
        addBubble("assistant", data.reply, data.recommendations || []);

        if (data.end_of_conversation) {
          addSystemNote("Conversation complete. Start over to begin a new shortlist.");
        }
      } catch (error) {
        addSystemNote("Unable to reach the server. Please try again.");
      } finally {
        setPending(false);
      }
    }

    formEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      const message = inputEl.value.trim();

      if (!message || sendEl.disabled) {
        return;
      }

      inputEl.value = "";
      await submitMessage(message);
    });

    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        formEl.requestSubmit();
      }
    });

    resetEl.addEventListener("click", resetConversation);

    resetConversation();
  </script>
</body>
</html>
